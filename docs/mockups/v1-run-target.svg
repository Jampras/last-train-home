  <text x="128" y="142" fill="#F3E6CE" font-family="Cormorant Garamond" font-size="34" font-weight="600">Target: Run</text>
  <text x="128" y="186" fill="#D7C7AE" font-family="Manrope" font-size="18">The lane stays readable, but the world gains depth, light,</text>
  <text x="128" y="212" fill="#D7C7AE" font-family="Manrope" font-size="18">fog, silhouettes and cleaner hierarchy.</text>
  <text x="128" y="262" fill="#F3E6CE" font-family="Cormorant Garamond" font-size="24" font-weight="600">Visual Notes</text>
  <text x="128" y="294" fill="#D7C7AE" font-family="Manrope" font-size="18">• Build nodes act like scenic punctuation</text>
  <text x="128" y="322" fill="#D7C7AE" font-family="Manrope" font-size="18">• The train remains the warm anchor at center</text>
  <text x="128" y="350" fill="#D7C7AE" font-family="Manrope" font-size="18">• Enemy silhouettes are readable without UI labels</text>
  <rect x="570" y="84" width="460" height="74" rx="28" fill="#132530" fill-opacity="0.78" stroke="#D9A35F" stroke-opacity="0.28"/>
  <text x="662" y="130" fill="#F3E6CE" font-family="Cormorant Garamond" font-size="28" font-weight="600">compact event strip</text>
