  <text x="128" y="164" fill="#F3E6CE" font-family="Cormorant Garamond" font-size="34" font-weight="600">Target: Hub</text>
  <text x="128" y="208" fill="#D7C7AE" font-family="Manrope" font-size="18">The train is the hero object. Progress is shown physically</text>
  <text x="128" y="234" fill="#D7C7AE" font-family="Manrope" font-size="18">through wagons, windows, smoke and route lights.</text>
  <text x="128" y="284" fill="#F3E6CE" font-family="Cormorant Garamond" font-size="24" font-weight="600">Visual Notes</text>
  <text x="128" y="316" fill="#D7C7AE" font-family="Manrope" font-size="18">• One calm info region on the left</text>
  <text x="128" y="344" fill="#D7C7AE" font-family="Manrope" font-size="18">• Route map as a luminous secondary motif</text>
  <text x="128" y="372" fill="#D7C7AE" font-family="Manrope" font-size="18">• Warm windows and lamp rhythm imply community</text>
