  <text x="112" y="140" fill="#F3E6CE" font-family="Cormorant Garamond" font-size="30" font-weight="600">Target: Prologo</text>
  <text x="112" y="184" fill="#D7C7AE" font-family="Manrope" font-size="18">Poster-like first screen. One warm anchor, one large sky,</text>
  <text x="112" y="210" fill="#D7C7AE" font-family="Manrope" font-size="18">train centered low, danger arriving from the right.</text>
  <text x="112" y="260" fill="#F3E6CE" font-family="Cormorant Garamond" font-size="24" font-weight="600">Visual Notes</text>
  <text x="112" y="292" fill="#D7C7AE" font-family="Manrope" font-size="18">• Lamp glow is the emotional center</text>
  <text x="112" y="320" fill="#D7C7AE" font-family="Manrope" font-size="18">• UI reduced to small poetic strips</text>
  <text x="112" y="348" fill="#D7C7AE" font-family="Manrope" font-size="18">• Train has weight, windows and rhythm</text>
  <text x="1042" y="455" fill="#F3E6CE" font-family="Manrope" font-size="16">first warm beacon</text>
  <line x1="1080" y1="460" x2="1044" y2="494" stroke="#F3E6CE" stroke-opacity="0.4"/>
  <text x="1310" y="632" fill="#F3E6CE" font-family="Manrope" font-size="16">barricade zone</text>
  <line x1="1300" y1="636" x2="1244" y2="644" stroke="#F3E6CE" stroke-opacity="0.4"/>
